name: VMware Certified Professional - Network Virtualization (VCP-NV)
short_name: VCP-NV
slug: vmware-vcp-nv
status: active
cost: "$250 USD"
exam_format: multiple-choice
passing_score: 300
duration_minutes: 135
question_count:
  min: 55
  max: 55

description: >-
  The VCP-NV validates skills in deploying, managing, and troubleshooting
  VMware NSX environments. It covers NSX architecture, logical switching
  and routing, security services, VPN and NAT, load balancing, and
  integration with VMware and third-party solutions for network
  virtualization.

tags:
  - virtualization
  - networking
  - vmware
  - nsx
  - professional

prerequisites:
  - Recommended NSX training course
  - Six months or more of experience with VMware NSX solutions
  - Two years of experience in IT

