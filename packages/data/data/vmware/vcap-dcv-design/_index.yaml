description: >-
  The VCAP-DCV Design validates advanced skills in designing VMware
  vSphere 8.x solutions. It tests the ability to apply design principles
  to develop conceptual, logical, and physical designs given customer
  requirements and constraints. This is an advanced-level certification
  for solution architects and design consultants.

