name: VMware Certified Professional - Data Center Virtualization (VCP-DCV)
short_name: VCP-DCV
slug: vmware-vcp-dcv
status: active
cost: "$250 USD"
exam_format: multiple-choice
duration_minutes: 130
question_count:
  min: 70
  max: 70

description: >-
  The VCP-DCV validates skills to implement, manage, and troubleshoot a
  VMware vSphere 8.x infrastructure. It is the most popular VMware
  certification and the primary entry point into the data center
  virtualization track, covering compute, storage, networking, security,
  and lifecycle management of vSphere environments.

tags:
  - virtualization
  - data-center
  - vmware
  - vsphere
  - professional

prerequisites:
  - Recommended training course such as VMware vSphere Install, Configure, Manage
  - Hands-on experience with VMware vSphere environments

related_certs:
