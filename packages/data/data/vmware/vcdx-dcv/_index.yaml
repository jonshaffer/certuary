name: VMware Certified Design Expert - Data Center Virtualization (VCDX-DCV)
short_name: VCDX-DCV
slug: vmware-vcdx-dcv
status: active
cost: "$995 USD"

description: >-
  The VCDX-DCV is the highest level of VMware certification, validating
  expert-level skills in designing and defending complex VMware vSphere
  solutions. Candidates must submit a detailed design document and
  successfully defend it before a panel of VCDX holders, as well as
  complete a live design scenario. It is intended for elite solution
  architects, design architects, and consultants.

tags:
  - virtualization
  - data-center
  - vmware
  - vsphere
  - design
  - expert
  - vcdx

prerequisites:
  - VCAP-DCV Design certification required
  - Extensive real-world experience designing complex vSphere-based solutions
  - Design document submission of 100-300 pages
  - Successful panel defense of submitted design

prerequisite_certs:
  - vmware-vcap-dcv-design

related_certs:
  - vmware-vcap-dcv-design
  - vmware-vcap-dcv-deploy

