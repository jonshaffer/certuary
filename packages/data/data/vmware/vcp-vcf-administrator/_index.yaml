name: VMware Certified Professional - VCF Administrator (VCP-VCF Administrator)
short_name: VCP-VCF Admin
slug: vmware-vcp-vcf-administrator
status: active
cost: "$250 USD"
exam_format: multiple-choice
passing_score: 300
duration_minutes: 135
