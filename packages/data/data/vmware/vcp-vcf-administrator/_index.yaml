description: >-
  The VCP-VCF Administrator validates skills required to deploy, manage,
  and support private cloud environments built on VMware Cloud Foundation.
  It covers VCF architecture, component management, Day 2 operations
  including lifecycle management, backup and recovery, password management,
  and troubleshooting across the integrated VCF stack.

