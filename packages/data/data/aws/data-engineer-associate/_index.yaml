name: AWS Certified Data Engineer – Associate
short_name: AWS DEA
slug: aws-data-engineer-associate
status: active
cost: "$150 USD"
exam_format: multiple-choice
passing_score: 70
duration_minutes: 170
question_count:
  min: 65
  approximate: true

description: >-
  Validates the ability to design, build, and manage data pipelines and
  data stores on AWS. Covers data ingestion, transformation, orchestration,
  security, and governance using services like Glue, Redshift, Kinesis,
  and Lake Formation.

