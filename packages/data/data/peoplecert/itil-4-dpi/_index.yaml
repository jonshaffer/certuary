name: "ITIL 4 Strategist: Direct, Plan and Improve"
short_name: ITIL 4 DPI
slug: itil-4-dpi
status: active
cost: "$495 USD"

description: >-
  The ITIL 4 Strategist: Direct, Plan and Improve module provides practical
  and strategic methods for planning and delivering continual improvement
  with the necessary agility. It covers the influence and impact of Agile
  and Lean ways of working and how they can be leveraged to an organization's
  advantage. This module is shared between the Managing Professional and
  Strategic Leader designations.

