description: >-
  The ITIL 4 Specialist: Drive Stakeholder Value module covers all types
  of engagement and interaction between a service provider and their
  customers, users, suppliers, and partners. It focuses on the conversion
  of demand into value through IT-enabled services, covering topics such as
  SLA design, multi-supplier management, customer journey mapping,
  and relationship management.

