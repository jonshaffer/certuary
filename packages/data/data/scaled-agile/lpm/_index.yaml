description: >-
  The Certified SAFe Lean Portfolio Manager (LPM) credential validates
  knowledge of applying Lean and Agile principles to portfolio strategy
  and investment funding, Agile portfolio operations, and Lean governance.
  LPM-certified professionals understand how to align portfolio strategy
  with enterprise objectives, establish portfolio flow, and apply Lean
  budgeting and guardrails across a SAFe portfolio.

