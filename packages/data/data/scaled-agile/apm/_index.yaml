passing_score: 77

description: >-
  The Certified SAFe Agile Product Management (APM) credential validates
  knowledge of defining and delivering desirable, viable, feasible, and
  sustainable products in a SAFe enterprise. APM-certified professionals
  understand how to apply Design Thinking, manage products by value stream,
  define product strategy and vision, develop and evolve product roadmaps,
  and deliver value using SAFe's customer-centric approach.

