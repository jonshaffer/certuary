passing_score: 77

description: >-
  The Certified SAFe Product Owner/Product Manager (POPM) credential validates
  knowledge of how to perform the Product Owner and Product Manager roles in a
  SAFe enterprise. POPM-certified professionals understand how to write epics
  and user stories, prioritize and manage program and team backlogs, build
  minimum viable products, and deliver value through Agile Release Trains.

