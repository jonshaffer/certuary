name: Certified SAFe Scrum Master
short_name: SSM
slug: safe-scrum-master
status: active
cost: "$995 USD"
exam_format: multiple-choice
duration_minutes: 90
question_count:
  min: 45
passing_score: 77

description: >-
  The Certified SAFe Scrum Master (SSM) credential validates knowledge of
  the Scrum Master role within a SAFe enterprise. SSM-certified professionals
  understand how to facilitate Agile team events, support program execution,
  coach teams in SAFe principles, and remove impediments to help deliver
  value on an Agile Release Train.

tags:
