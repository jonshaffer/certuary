description: >-
  The Certified SAFe Agilist (SA) credential validates knowledge in leading
  a Lean-Agile enterprise by applying the principles and practices of the
  Scaled Agile Framework. SA-certified professionals understand how to
  execute and release value through Agile Release Trains, build an Agile
  portfolio, and lead the Lean-Agile transformation at enterprise scale.

