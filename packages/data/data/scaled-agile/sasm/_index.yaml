passing_score: 77

description: >-
  The Certified SAFe Advanced Scrum Master (SASM) credential validates
  advanced knowledge in facilitating Agile team and program-level processes,
  coaching teams to improve, and addressing Agile anti-patterns in a SAFe
  enterprise. SASM-certified professionals can facilitate program planning
  events, support DevOps and continuous delivery, and scale Scrum practices
  across the organization.

