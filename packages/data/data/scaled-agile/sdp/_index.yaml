name: Certified SAFe DevOps Practitioner
short_name: SDP
slug: safe-devops
status: active
cost: "$995 USD"
exam_format: multiple-choice
duration_minutes: 90
question_count:
  min: 45
passing_score: 77

description: >-
  The Certified SAFe DevOps Practitioner (SDP) credential validates knowledge
  of integrating DevOps practices with SAFe principles to improve the flow
  of value through the continuous delivery pipeline. SDP-certified professionals
  understand how to map value streams, implement continuous integration and
  deployment, apply test automation strategies, and build a culture of shared
  responsibility between development and operations.

