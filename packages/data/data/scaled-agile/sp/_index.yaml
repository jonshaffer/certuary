passing_score: 77

description: >-
  The Certified SAFe Practitioner (SP) credential validates foundational
  knowledge of the Scaled Agile Framework. SP-certified professionals
  understand SAFe principles, how to participate effectively on an Agile
  Release Train, and how to collaborate with other teams to deliver value
  in a SAFe enterprise.

