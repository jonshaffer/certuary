name: Certified SAFe Architect
short_name: ARCH
slug: safe-architect
status: active
cost: "$995 USD (exam only) / ~$2,000+ USD (course + exam)"
exam_format: multiple-choice
duration_minutes: 90
question_count:
  min: 45

description: >-
  The Certified SAFe Architect (ARCH) credential validates knowledge of
  aligning architecture with business value while enabling Agile development
  at enterprise scale. ARCH-certified professionals understand how to
  develop architectural runway, align architecture with program and
  portfolio backlogs, support continuous delivery, and apply set-based
  design and emergent architecture principles within SAFe.

