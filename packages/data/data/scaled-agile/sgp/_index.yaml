name: Certified SAFe Government Practitioner
short_name: SGP
slug: safe-government-practitioner
status: active
cost: "$995 USD"
exam_format: multiple-choice
duration_minutes: 90
question_count:
  min: 45
passing_score: 77

description: >-
  The Certified SAFe Government Practitioner (SGP) credential validates
  knowledge of applying Lean-Agile principles and SAFe practices within
  government and public sector organizations. SGP-certified professionals
  understand how to navigate regulatory environments, apply SAFe in the
  context of government acquisition processes, and deliver value in
  compliance with public sector requirements such as FAR and FITARA.

