passing_score: 77

description: >-
  The Certified SAFe Program Consultant (SPC) credential is the highest
  widely-attained SAFe certification. SPC-certified professionals are
  change agents who combine technical knowledge of SAFe with the ability
  to train others and lead enterprise Lean-Agile transformations. SPCs
  can teach SAFe courses, coach Agile Release Trains, and guide
  organizations in adopting SAFe practices at scale.

