name: Certified SAFe Program Consultant
short_name: SPC
slug: safe-spc
status: active
cost: "$995 USD (exam only) / ~$3,500+ USD (course + exam)"
exam_format: multiple-choice
duration_minutes: 90
question_count:
  min: 45
passing_score: 77

description: >-
  The Certified SAFe Program Consultant (SPC) credential is the highest
  widely-attained SAFe certification. SPC-certified professionals are
  change agents who combine technical knowledge of SAFe with the ability
  to train others and lead enterprise Lean-Agile transformations. SPCs
  can teach SAFe courses, coach Agile Release Trains, and guide
  organizations in adopting SAFe practices at scale.

tags:
  - agile
  - scaled-agile
  - safe
  - expert
  - consulting
  - lean

prerequisites:
  - Attend the Implementing SAFe (SPC) course from Scaled Agile
  - Significant experience in an Agile environment recommended
  - Hold at least one SAFe certification recommended

prerequisite_certs:
  - safe-agilist

related_certs:
