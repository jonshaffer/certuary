name: Certified SAFe Release Train Engineer
short_name: RTE
slug: safe-rte
status: active
cost: "$995 USD (exam only) / ~$2,000+ USD (course + exam)"
exam_format: multiple-choice
duration_minutes: 90
question_count:
  min: 45

description: >-
  The Certified SAFe Release Train Engineer (RTE) credential validates
  knowledge of the servant leader and coach role responsible for facilitating
  Agile Release Train (ART) events and processes. RTE-certified professionals
  understand how to plan and execute Program Increments, facilitate system
  demos, foster continuous improvement, and manage risks and dependencies
  across teams.

