name: Open Agile Architecture Practitioner
short_name: O-AA P
slug: open-agile-architecture-practitioner
status: active
cost: "$330 USD"

description: >-
  The Open Agile Architecture Practitioner certification validates knowledge of
  the Open Agile Architecture (O-AA) standard. It covers applying O-AA axioms
  to develop and maintain agile architectures, including agile strategy,
  business agility, design thinking, product architecture, and operations
  architecture.

