name: DPBoK Foundation
short_name: DPBoK F
slug: dpbok-foundation
status: active
cost: "$330 USD"

description: >-
  The DPBoK Foundation certification validates knowledge of the Digital
  Practitioner Body of Knowledge. It covers practices for digital organizations
  of all sizes, including product management, work management, infrastructure,
  application delivery, operational management, governance, and information
  management.

