name: Certified Cloud Security Professional
short_name: CCSP
slug: ccsp
status: active
cost: "$599 USD"

description: >-
  The CCSP validates advanced knowledge and skills in cloud security
  design, implementation, architecture, operations, and compliance.
  It covers six domains including cloud data security, cloud platform
  and infrastructure security, and cloud application security.

tags:
