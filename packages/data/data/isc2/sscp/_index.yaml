name: Systems Security Certified Practitioner
short_name: SSCP
slug: sscp
status: active
cost: "$249 USD"

description: >-
  The SSCP validates hands-on technical skills in implementing, monitoring,
  and administering IT infrastructure using security best practices. It
  covers seven domains including access controls, security operations,
  and incident response.

tags:
