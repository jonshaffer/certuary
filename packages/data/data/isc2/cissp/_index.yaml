name: Certified Information Systems Security Professional
short_name: CISSP
slug: cissp
status: active
cost: "$749 USD"

description: >-
  The CISSP is the gold standard in information security certifications,
  covering eight domains including security and risk management, asset
  security, security architecture, and software development security.
  It is approved for DoD 8570 IAM Level III and IAT Level III.

tags:
  - cybersecurity
  - advanced
  - dod-8570
  - isc2

prerequisites:
  - Five years of cumulative paid work experience in two or more of the eight CISSP domains

