name: HealthCare Information Security and Privacy Practitioner
short_name: HCISPP
slug: hcispp
status: active
cost: "$599 USD"

description: >-
  The HCISPP validates knowledge in implementing, managing, and assessing
  security and privacy controls for healthcare information. It covers
  seven domains including healthcare industry, regulatory and standards
  environment, and privacy and security in healthcare.

