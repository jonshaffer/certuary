name: SABSA Chartered Security Architect - Master Certificate
short_name: SCM
slug: scm
status: active
cost: "Included in training (approx. $3,760 USD per Advanced module)"

description: >-
  The SABSA Chartered Master (SCM) is the highest level of SABSA certification,
  demonstrating advanced competencies and leadership in enterprise security
  architecture. Candidates must hold the SCP designation, pass a second Advanced
  module (A1-A5), and complete an original Master Thesis that demonstrates
  advanced application of the SABSA methodology in practice. The thesis must
  show original thinking and a significant contribution to the field.

exam_format: essay

tags:
  - security-architecture
  - enterprise
  - expert
  - master
  - sabsa

prerequisites:
  - SABSA Chartered Practitioner (SCP) certification
  - Completion of a second SABSA Advanced module (A1-A5)
  - Submission and approval of an original SABSA Master Thesis

prerequisite_certs:
  - scp

related_certs:
  - scp
  - scf
  - cissp

