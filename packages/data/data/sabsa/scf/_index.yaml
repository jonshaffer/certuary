description: >-
  The SABSA Chartered Foundation (SCF) certification validates core knowledge
  and understanding of the SABSA method, frameworks, concepts, models, and
  techniques for enterprise security architecture. The exam consists of two
  modules: F1 (Security Strategy & Planning) and F2 (Security Service
  Management), each containing 48 multiple-choice questions distributed across
  six knowledge domains aligned with the layers of the SABSA architecture
  matrix.

