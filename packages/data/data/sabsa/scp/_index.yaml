name: SABSA Chartered Security Architect - Practitioner Certificate
short_name: SCP
slug: scp
status: active

description: >-
  The SABSA Chartered Practitioner (SCP) certification demonstrates applied
  competence in enterprise security architecture. Candidates earn SCP by
  completing any one of five Advanced modules (A1-A5) and passing an
  assignment-based examination. The exam presents five questions from which
  candidates choose two to answer, using real-world or case-study examples to
  assess issues, evaluate solution approaches, and apply the SABSA method to
  create appropriate work-products. Answers must be submitted within four weeks
  of the examination date.

exam_format: essay

tags:
  - security-architecture
  - enterprise
  - advanced
  - practitioner
  - sabsa

prerequisites:
  - SABSA Chartered Foundation (SCF) certification
  - Attendance at an official SABSA Advanced training course through a SABSA Accredited Education Provider (AEP)

