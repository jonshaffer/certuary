cost: "$70.50 USD"

description: >-
  The Terraform Authoring and Operations Professional certification
  validates advanced skills in authoring Terraform configuration,
  collaborating on infrastructure as code using Terraform Cloud or
  Terraform Enterprise, and operationalizing Terraform workflows
  in production. It is a lab-based exam requiring hands-on
  demonstration of Terraform expertise.

