name: "HashiCorp Certified: Vault Associate"
short_name: Vault Associate
slug: vault-associate
status: active
cost: "$70.50 USD"

description: >-
  The Vault Associate certification validates foundational knowledge of
  HashiCorp Vault including secrets management, authentication methods,
  policies, tokens, Vault architecture, and encryption as a service.
  It is designed for security engineers and operations professionals
  managing secrets in cloud and on-premises environments.

tags:
  - security
  - devops
  - cloud
  - hashicorp
  - intermediate
  - secrets-management

prerequisites: []

related_certs:
  - terraform-associate
  - vault-operations-professional
  - consul-associate
  - comptia-security-plus
  - cissp

exam_format: multiple-choice
duration_minutes: 60
question_count:
  min: 57
  max: 57

versions:
  - version: "003"
    release_date: "2024-03-01"
    notes: >-
      Updated to cover Vault 1.x features including secrets engines,
      namespaces, and integrated storage.

