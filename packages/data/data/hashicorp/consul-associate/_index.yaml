name: "HashiCorp Certified: Consul Associate"
short_name: Consul Associate
slug: consul-associate
status: active
cost: "$70.50 USD"

description: >-
  The Consul Associate certification validates foundational knowledge of
  HashiCorp Consul including service discovery, service mesh, health
  checking, key/value store, and network infrastructure automation.
  It is designed for networking and DevOps professionals managing
  service-oriented architectures.

