name: "HashiCorp Certified: Terraform Associate"
short_name: Terraform Associate
slug: terraform-associate
status: active
cost: "$70.50 USD"

description: >-
  The Terraform Associate certification validates foundational knowledge
  of HashiCorp Terraform including infrastructure as code concepts,
  Terraform workflow, state management, modules, and the core configuration
  language (HCL). It is aimed at cloud engineers and DevOps professionals
  who use Terraform to provision and manage infrastructure.

tags:
  - devops
  - infrastructure-as-code
  - cloud
  - hashicorp
  - intermediate
  - terraform

prerequisites: []

related_certs:
  - vault-associate
  - consul-associate
  - aws-cloud-practitioner
  - azure-administrator
  - cka

exam_format: multiple-choice
duration_minutes: 60
question_count:
  min: 57
  max: 57

versions:
  - version: "003"
    release_date: "2023-10-01"
    notes: >-
      Updated to cover Terraform 1.x features including moved blocks,
      import blocks, and updated provider ecosystem.

