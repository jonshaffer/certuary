name: Certificate of Cloud Auditing Knowledge
short_name: CCAK
slug: ccak
status: active
cost: "$395 USD (ISACA member) / $495 USD (non-member)"

description: >-
  The CCAK is the industry's first global, vendor-neutral credential for
  auditing cloud computing systems. Developed in collaboration between CSA
  and ISACA, it fills the gap for technical education in cloud IT auditing.
  The exam has 76 multiple-choice questions with a 70% passing score, and
  the credential is valid for life with no continuing education required.

