name: Certificate of Competence in Zero Trust
short_name: CCZT
slug: cczt
status: active
cost: "$175 USD"

description: >-
  The CCZT is the cloud security industry's first vendor-neutral Zero Trust
  certification program. It covers foundational Zero Trust components from
  CISA and NIST, Software Defined Perimeter guidance from CSA Research, and
  principles from Zero Trust experts. The exam is open-book with 60
  multiple-choice questions and requires an 80% passing score.

