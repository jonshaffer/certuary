name: Certificate of Cloud Security Knowledge
short_name: CCSK
slug: ccsk
status: active
cost: "$445 USD"

description: >-
  The CCSK is the industry benchmark for cloud security expertise, covering
  all domains from the CSA Security Guidance including zero trust, DevSecOps,
  cloud telemetry, security analytics, and artificial intelligence. The exam
  is open-book with 60 multiple-choice questions and requires an 80% passing
  score.

