name: Certified Scrum Professional - ScrumMaster
short_name: CSP-SM
slug: scrum-alliance-csp-sm
status: active
cost: "$495 USD"

description: >-
  The Certified Scrum Professional - ScrumMaster (CSP-SM) certification
  represents a professional level of mastery of Scrum and the Scrum Master
  role. CSP-SMs have demonstrated sustained practical experience and deep
  understanding of Scrum principles, enabling them to guide teams and
  organizations through complex agile transformations.

tags:
  - scrum
  - agile
  - professional
  - scrum-master
  - course-based

prerequisites:
  - Hold an active A-CSM certification
  - 24 months of work experience specific to the role of Scrum Master within the last 5 years
  - Attend a CSP-SM course taught by a Certified Scrum Trainer (CST)

prerequisite_certs:
  - scrum-alliance-a-csm

