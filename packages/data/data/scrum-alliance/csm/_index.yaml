name: Certified ScrumMaster
short_name: CSM
slug: scrum-alliance-csm
status: active
cost: "$495 USD"

description: >-
  The Certified ScrumMaster (CSM) certification validates foundational
  knowledge of Scrum principles and practices. CSMs understand the Scrum
  framework and can support a Scrum team in adopting and using Scrum
  effectively. This is a course-based certification requiring attendance
  of a CSM course taught by a Certified Scrum Trainer.

tags:
