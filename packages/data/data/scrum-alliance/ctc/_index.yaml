name: Certified Team Coach
short_name: CTC
slug: scrum-alliance-ctc
status: active

description: >-
  The Certified Team Coach (CTC) is a guide-level certification recognizing
  experienced agile practitioners who have demonstrated deep coaching skills
  at the team level. CTCs are skilled in facilitating team growth, resolving
  impediments, and fostering high-performing agile teams. This certification
  is application-based and requires demonstrated coaching experience.

tags:
  - scrum
  - agile
  - expert
  - coaching

prerequisites:
  - Hold an active CSP-SM or CSP-PO certification
  - Demonstrated coaching experience at the team level
  - Application and review process

related_certs:
  - scrum-alliance-cec
  - scrum-alliance-csp-sm
  - scrum-alliance-csp-po

links:
