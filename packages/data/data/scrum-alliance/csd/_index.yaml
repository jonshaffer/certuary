name: Certified Scrum Developer
short_name: CSD
slug: scrum-alliance-csd
status: active
cost: "$495 USD"

description: >-
  The Certified Scrum Developer (CSD) certification validates knowledge of
  Scrum principles and agile engineering practices. CSDs understand how to
  apply Scrum in a development context, including technical practices that
  support agile development. This is a course-based certification requiring
  attendance of a CSD course taught by a Certified Scrum Trainer.

tags:
