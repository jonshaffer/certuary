name: PMI Scheduling Professional
short_name: PMI-SP
slug: pmi-sp
status: active
cost: "$520 USD (PMI member) / $670 USD (non-member)"
exam_format: multiple-choice
duration_minutes: 150
question_count:
  min: 115

description: >-
  The PMI-SP certification recognizes expertise in the specialized area
  of developing and maintaining project schedules. It is designed for
  project scheduling specialists who manage complex schedules, perform
  schedule analysis, and ensure timely project delivery.

tags:
  - project-management
  - scheduling
  - professional
  - pmi

prerequisites:
  - Four-year degree, 36 months of project scheduling experience, and 30 hours of project scheduling education; OR
  - Secondary degree, 54 months of project scheduling experience, and 40 hours of project scheduling education

