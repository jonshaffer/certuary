name: Project Management Professional
short_name: PMP
slug: pmi-pmp
status: active
cost: "$405 USD (PMI member) / $555 USD (non-member)"
exam_format: multiple-choice
duration_minutes: 230
question_count:
  min: 180

description: >-
  The PMP is PMI's flagship certification and the most recognized project
  management credential worldwide. It validates competence in leading and
  directing projects using predictive, agile, and hybrid approaches. The
  exam covers people, process, and business environment domains.

tags:
  - project-management
  - professional
  - agile
  - pmi

prerequisites:
  - Four-year degree, 36 months leading projects, and 35 hours of project management education; OR
  - Secondary degree (high school diploma or equivalent), 60 months leading projects, and 35 hours of project management education

