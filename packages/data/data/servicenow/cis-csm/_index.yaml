name: ServiceNow Certified Implementation Specialist - Customer Service Management
short_name: ServiceNow CIS-CSM
slug: servicenow-cis-csm
status: active
cost: "$450 USD"

description: >-
  Validates expertise in implementing and configuring ServiceNow Customer
  Service Management solutions. Covers case management, agent workspace,
  customer and consumer portals, knowledge management, and service level
  agreements for delivering customer service workflows on the Now Platform.

tags:
  - csm
  - customer-service
  - intermediate
  - servicenow
  - implementation

prerequisites:
  - ServiceNow Certified System Administrator (CSA) certification required
  - Two or more years of ServiceNow experience recommended

