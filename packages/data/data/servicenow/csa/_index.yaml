name: ServiceNow Certified System Administrator
short_name: ServiceNow CSA
slug: servicenow-csa
status: active
cost: "$300 USD"

description: >-
  Validates foundational knowledge of the ServiceNow platform, including
  instance configuration, database administration, user interface
  customization, workflow automation, and self-service capabilities. The CSA
  is the prerequisite for all other ServiceNow certifications and is ideal
  for administrators responsible for managing and configuring ServiceNow
  instances.

tags:
  - itsm
  - platform
  - entry-level
  - servicenow
  - administration

prerequisites:
  - ServiceNow Fundamentals on-demand course or equivalent experience recommended

related_certs:
  - servicenow-cad
  - servicenow-cis-itsm

exam_format: multiple-choice
passing_score: 70
duration_minutes: 90
question_count:
  min: 60
  max: 60

versions:
  - version: "Zurich"
    release_date: "2026-03-01"
    notes: Updated to align with the Zurich release of the Now Platform.
  - version: "Xanadu"
    release_date: "2024-09-01"
    notes: Previous mainline version aligned with the Xanadu release.

