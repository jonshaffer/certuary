name: ServiceNow Certified Implementation Specialist - IT Operations Management
short_name: ServiceNow CIS-ITOM
slug: servicenow-cis-itom
status: active
cost: "$450 USD"

description: >-
  Validates expertise in implementing and configuring ServiceNow IT Operations
  Management solutions, including Discovery, Service Mapping, and Event
  Management. Demonstrates the ability to automate IT operations, map business
  services, and manage infrastructure visibility on the Now Platform.

tags:
  - itom
  - operations
  - intermediate
  - servicenow
  - implementation

prerequisites:
  - ServiceNow Certified System Administrator (CSA) certification required
  - CIS-Data Foundations (CMDB and CSDM) certification required (external prerequisite, not tracked in this project)
  - Hands-on experience with ServiceNow ITOM modules recommended

related_certs:
  - servicenow-csa
  - servicenow-cis-itsm

exam_format: multiple-choice
passing_score: 70
duration_minutes: 90
question_count:
  min: 60
  max: 60

