name: ServiceNow Certified Implementation Specialist - Human Resources
short_name: ServiceNow CIS-HR
slug: servicenow-cis-hr
status: active
cost: "$450 USD"

description: >-
  Validates expertise in implementing and configuring ServiceNow HR Service
  Delivery solutions. Covers HR system architecture, lifecycle events,
  employee center configuration, case management, and platform security
  for human resources workflows on the Now Platform.

