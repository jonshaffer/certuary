name: ServiceNow Certified Implementation Specialist - IT Service Management
short_name: ServiceNow CIS-ITSM
slug: servicenow-cis-itsm
status: active
cost: "$450 USD"

description: >-
  Validates expertise in implementing and configuring ServiceNow IT Service
  Management applications, including incident, problem, change, and request
  management. Demonstrates the ability to design and deploy ITSM solutions
  aligned with ITIL best practices on the Now Platform.

tags:
  - itsm
  - itil
  - intermediate
  - servicenow
  - implementation

prerequisites:
  - ServiceNow Certified System Administrator (CSA) certification required
  - Six months or more of hands-on experience with ServiceNow ITSM recommended

related_certs:
  - servicenow-csa
  - servicenow-cis-itom
  - servicenow-cad

exam_format: multiple-choice
passing_score: 70
duration_minutes: 90
question_count:
  min: 60
  max: 60

