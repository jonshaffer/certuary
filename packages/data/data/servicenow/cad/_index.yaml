name: ServiceNow Certified Application Developer
short_name: ServiceNow CAD
slug: servicenow-cad
status: active
cost: "$300 USD"

description: >-
  Validates the ability to design, develop, and deploy custom applications on
  the ServiceNow platform. Covers application security, user experience
  design, scripting, data management, workflow automation, and application
  lifecycle management. Intended for developers building solutions on the
  Now Platform.

tags:
  - development
  - application
  - intermediate
  - servicenow
  - scripting

prerequisites:
  - ServiceNow Certified System Administrator (CSA) certification required
  - Application Developer on-demand course or equivalent experience recommended

related_certs:
  - servicenow-csa
  - servicenow-cis-itsm

exam_format: multiple-choice
passing_score: 70
duration_minutes: 90
question_count:
  min: 60
  max: 60

versions:
  - version: "Zurich"
    release_date: "2026-03-01"
    notes: Updated to align with the Zurich release of the Now Platform.
  - version: "Xanadu"
    release_date: "2024-09-01"
    notes: Previous mainline version aligned with the Xanadu release.

