name: ServiceNow Certified Implementation Specialist - Security Incident Response
short_name: ServiceNow CIS-SIR
slug: servicenow-cis-sir
status: active
cost: "$450 USD"

description: >-
  Validates expertise in implementing and configuring ServiceNow Security
  Incident Response solutions. Covers security incident lifecycle management,
  threat intelligence integration, vulnerability response workflows, and
  automated remediation on the Now Platform. Formerly known as CIS-SecOps.

tags:
  - security
  - secops
  - intermediate
  - servicenow
  - implementation

prerequisites:
  - ServiceNow Certified System Administrator (CSA) certification required
  - Security Operations Fundamentals course or equivalent experience recommended

related_certs:
  - servicenow-csa
  - servicenow-cis-itsm
  - servicenow-cis-rc

exam_format: multiple-choice
passing_score: 70
duration_minutes: 90
