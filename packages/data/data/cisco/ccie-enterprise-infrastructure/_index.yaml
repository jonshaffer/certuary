name: CCIE Enterprise Infrastructure
short_name: CCIE EI
slug: ccie-enterprise-infrastructure
status: active
cost: "$1,600 USD (lab exam)"
exam_format: performance-based
duration_minutes: 480

description: >-
  The highest level of Cisco enterprise networking certification. Validates
  expert-level knowledge through an 8-hour hands-on lab exam covering complex
  enterprise infrastructure including dual-stack architecture, virtualization,
  infrastructure, network assurance, security, and automation. Requires passing
  the CCNP Enterprise ENCOR exam as a qualifying exam.

tags:
  - networking
  - expert
  - cisco
  - enterprise
  - routing
  - switching
  - ccie

prerequisites:
  - 5-7 years of enterprise networking experience recommended
  - Must pass ENCOR (350-401) qualifying exam before scheduling lab

prerequisite_certs:
  - ccnp-enterprise

