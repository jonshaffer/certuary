name: CCIE Enterprise Wireless
short_name: CCIE EW
slug: ccie-enterprise-wireless
status: active
cost: "$1,600 USD (lab exam)"
exam_format: performance-based
duration_minutes: 480

description: >-
  Validates expert-level knowledge of enterprise wireless networking through
  an 8-hour hands-on lab exam covering wireless network design, deployment,
  operation, and optimization. Requires passing the CCNP Enterprise ENCOR
  exam as a qualifying exam.

tags:
  - networking
  - expert
  - cisco
  - wireless
  - enterprise
  - ccie

prerequisites:
  - 5-7 years of enterprise wireless networking experience recommended
  - Must pass ENCOR (350-401) qualifying exam before scheduling lab

prerequisite_certs:
  - ccnp-enterprise

related_certs:
