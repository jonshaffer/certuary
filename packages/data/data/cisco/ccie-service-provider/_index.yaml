name: CCIE Service Provider
short_name: CCIE SP
slug: ccie-service-provider
status: active
cost: "$1,600 USD (lab exam)"
exam_format: performance-based
duration_minutes: 480

description: >-
  Validates expert-level knowledge of service provider networking through an
  8-hour hands-on lab exam covering complex service provider technologies
  including core architecture, services, networking, automation, and transport.
  Requires passing the CCNP Service Provider SPCOR exam as a qualifying exam.

tags:
  - service-provider
  - expert
  - cisco
  - networking
  - mpls
  - ccie

prerequisites:
  - 5-7 years of service provider networking experience recommended
  - Must pass SPCOR (350-501) qualifying exam before scheduling lab

prerequisite_certs:
  - ccnp-service-provider

related_certs:
  - ccnp-service-provider

