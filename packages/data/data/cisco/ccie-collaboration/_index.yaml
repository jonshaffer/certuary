name: CCIE Collaboration
short_name: CCIE Collab
slug: ccie-collaboration
status: active
cost: "$1,600 USD (lab exam)"
exam_format: performance-based
duration_minutes: 480

description: >-
  Validates expert-level knowledge of collaboration solutions through an
  8-hour hands-on lab exam covering complex unified communications
  technologies including call control, QoS, messaging, presence, and
  collaboration endpoints. Requires passing the CCNP Collaboration CLCOR
  exam as a qualifying exam.

tags:
  - collaboration
  - expert
  - cisco
  - unified-communications
  - ccie

prerequisites:
  - 5-7 years of collaboration solutions experience recommended
  - Must pass CLCOR (350-801) qualifying exam before scheduling lab

prerequisite_certs:
  - ccnp-collaboration

related_certs:
