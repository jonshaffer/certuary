name: CCIE Data Center
short_name: CCIE DC
slug: ccie-data-center
status: active
cost: "$1,600 USD (lab exam)"
exam_format: performance-based
duration_minutes: 480

description: >-
  Validates expert-level knowledge of data center infrastructure through an
  8-hour hands-on lab exam covering complex data center technologies including
  network, compute, storage networking, automation, and security. Requires
  passing the CCNP Data Center DCCOR exam as a qualifying exam.

tags:
  - data-center
  - expert
  - cisco
  - networking
  - ccie

prerequisites:
  - 5-7 years of data center infrastructure experience recommended
  - Must pass DCCOR (350-601) qualifying exam before scheduling lab

