description: >-
  The GPEN certification validates a practitioner's ability to conduct
  penetration tests using best-practice techniques and methodologies. It
  covers comprehensive pen test planning, scoping, reconnaissance,
  exploitation, password attacks, and web application attacks. Associated
  with SANS SEC560: Enterprise Penetration Testing.
