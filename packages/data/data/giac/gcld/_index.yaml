description: >-
  The GCLD certification validates a practitioner's ability to implement
  preventive, detective, and reactive security controls in cloud
  environments. It covers cloud infrastructure, identity and access
  management, data protection, and securing workloads across major cloud
  providers. Associated with SANS SEC510: Cloud Security Controls and
  Mitigations.
