description: >-
  The GNFA certification validates a practitioner's ability to perform
  network forensics investigations. It covers network architecture,
  protocols, automated tools, network analysis, wireless network forensics,
  and the examination of network-based evidence. Associated with SANS
  FOR572: Advanced Network Forensics - Threat Hunting, Analysis, and
  Incident Response.
