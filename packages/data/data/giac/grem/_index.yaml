description: >-
  The GREM certification validates a practitioner's ability to reverse-engineer
  malicious software targeting common platforms including Windows and web
  browsers. It covers malware analysis, document analysis, protected
  executables, and web-based malware. Associated with SANS FOR610: Reverse
  Engineering Malware - Malware Analysis Tools and Techniques.
