description: >-
  The GPYC certification validates a practitioner's ability to write
  and analyze Python code for security tasks. It covers Python
  fundamentals, data structures, object-oriented programming, libraries,
  and the application of Python to security-related tasks such as
  automation and tool development. Associated with SANS SEC573: Automating
  Information Security with Python.
