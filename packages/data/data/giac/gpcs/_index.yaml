description: >-
  The GPCS certification validates a practitioner's ability to secure
  public cloud environments including AWS, Azure, and GCP. It covers
  cloud fundamentals, identity management, compute and network security,
  logging and monitoring, and automation of security controls. Associated
  with SANS SEC541: Cloud Security Attacker Techniques, Monitoring, and
  Threat Detection.
