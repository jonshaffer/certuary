description: >-
  The GCFE certification validates a practitioner's knowledge of computer
  forensic analysis with a focus on core skills needed to collect and
  analyze data from Windows, Linux, and macOS systems. It covers digital
  forensics fundamentals, browser forensics, email analysis, and Windows
  artifact analysis. Associated with SANS FOR500: Windows Forensic Analysis.
