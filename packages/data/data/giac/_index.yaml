name: GIAC
slug: giac
website: https://www.giac.org
description: >-
  GIAC (Global Information Assurance Certification) provides industry-leading
  cybersecurity certifications developed in partnership with SANS Institute.
  GIAC validates practitioners' ability to apply real-world skills in
  areas such as cyber defense, penetration testing, digital forensics,
  incident response, cloud security, and industrial control systems.
