description: >-
  The GSLC certification validates a practitioner's understanding of
  security management concepts, technical security frameworks, and
  operational security. It covers project management, risk management,
  security policy, network and communication security, and change
  management. Associated with SANS MGT512: Security Leadership Essentials
  for Managers.
