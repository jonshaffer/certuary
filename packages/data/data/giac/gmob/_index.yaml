description: >-
  The GMOB certification validates a practitioner's ability to assess and
  manage the security of mobile devices and applications. It covers mobile
  device and app security testing, mobile malware analysis, mobile
  penetration testing, and mobile forensics. Associated with SANS SEC575:
  Mobile Device Security and Ethical Hacking.
