description: >-
  The GWAPT certification validates a practitioner's ability to assess
  web application security through penetration testing. It covers web
  application technology, authentication attacks, injection flaws,
  cross-site scripting, cross-site request forgery, and web application
  reconnaissance. Associated with SANS SEC542: Web App Penetration
  Testing and Ethical Hacking.
