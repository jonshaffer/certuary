description: >-
  The GCTI certification validates a practitioner's ability to collect,
  analyze, and apply cyber threat intelligence. It covers strategic,
  operational, and tactical intelligence, threat modeling, attribution,
  intelligence sharing frameworks, and analysis of adversary tactics,
  techniques, and procedures. Associated with SANS FOR578: Cyber Threat
  Intelligence.
