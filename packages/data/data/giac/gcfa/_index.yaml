description: >-
  The GCFA certification validates a practitioner's advanced skills in
  digital forensics, threat hunting, and incident response. It covers
  advanced forensic analysis of file systems, volatile data, timeline
  analysis, anti-forensics detection, and threat hunting techniques.
  Associated with SANS FOR508: Advanced Incident Response, Threat Hunting,
  and Digital Forensics.
