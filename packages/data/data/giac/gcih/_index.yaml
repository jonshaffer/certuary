description: >-
  The GCIH certification validates a practitioner's ability to detect, respond
  to, and resolve computer security incidents. It covers incident handling
  processes, common attack techniques, and defense strategies including
  endpoint attacks, network attacks, and cloud-based threats. Associated
  with SANS SEC504: Hacker Tools, Techniques, and Incident Handling.
