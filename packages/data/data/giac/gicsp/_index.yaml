description: >-
  The GICSP certification validates a practitioner's knowledge of securing
  industrial control systems (ICS) and SCADA environments. It bridges IT
  and OT security, covering ICS components, network design, threat
  intelligence, incident response, and governance for industrial
  environments. Associated with SANS ICS410: ICS/SCADA Security Essentials.
