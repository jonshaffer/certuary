description: >-
  The GASF certification validates a practitioner's ability to perform
  forensic examinations on smartphones and mobile devices. It covers mobile
  device forensics methodologies, filesystem analysis, application analysis,
  and the extraction and decoding of evidence from iOS and Android devices.
  Associated with SANS FOR585: Smartphone Forensic Analysis In-Depth.
