name: CompTIA Network+
short_name: Network+
slug: comptia-network-plus
status: active
cost: "$404 USD"

description: >-
  CompTIA Network+ validates the ability to design, configure, manage, and
  troubleshoot wired and wireless network devices. It covers networking
  fundamentals, implementations, operations, security, and troubleshooting.

tags:
  - networking
  - intermediate
  - infrastructure
  - dod-8570

prerequisites:
  - CompTIA A+ certification recommended
  - Nine to twelve months of networking experience recommended

prerequisite_certs:
  - comptia-a-plus

related_certs:
  - comptia-a-plus
  - comptia-security-plus
  - comptia-cloud-plus
  - ccna

