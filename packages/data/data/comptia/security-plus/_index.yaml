name: CompTIA Security+
short_name: Security+
slug: comptia-security-plus
status: active
cost: "$404 USD"

description: >-
  CompTIA Security+ validates baseline cybersecurity skills including threat
  assessment, network security, identity management, and cryptography. It
  meets DoD 8570 compliance requirements.

tags:
  - cybersecurity
  - intermediate
  - dod-8570
  - network-security

prerequisites:
  - CompTIA A+ recommended but not required
  - Two years of IT administration experience recommended

