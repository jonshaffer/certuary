name: CompTIA Server+
short_name: Server+
slug: comptia-server-plus
status: active
cost: "$404 USD"

description: >-
  CompTIA Server+ validates the skills required to work in data centers and
  cloud environments. It covers server hardware, server administration,
  security, disaster recovery, and troubleshooting.

tags:
  - server
  - intermediate
  - infrastructure
  - data-center

prerequisites:
  - CompTIA A+ recommended
  - Eighteen to twenty-four months of IT administration experience recommended

related_certs:
  - comptia-a-plus
  - comptia-network-plus
  - comptia-linux-plus
  - comptia-cloud-plus

versions:
