description: >-
  The NSE 3 certification validates awareness of the Fortinet Security
  Fabric and its product portfolio including FortiGate, FortiManager,
  FortiAnalyzer, FortiClient, FortiWeb, FortiMail, and other Fortinet
  security solutions. It is designed to provide a technical overview of
  how Fortinet products integrate to provide comprehensive security.

