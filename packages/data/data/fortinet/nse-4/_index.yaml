name: "Fortinet NSE 4: FortiOS"
short_name: NSE 4
slug: nse-4
status: active
cost: "$400 USD"

description: >-
  The NSE 4 certification validates the ability to configure, manage,
  and troubleshoot FortiGate firewall appliances running FortiOS. It
  covers firewall policies, NAT, VPN, user authentication, web filtering,
  application control, antivirus, IPS, SSL inspection, and logging and
  monitoring on FortiGate next-generation firewalls.

tags:
  - cybersecurity
  - network-security
  - firewall
  - fortinet
  - intermediate

prerequisites:
  - NSE 1, NSE 2, and NSE 3 recommended

