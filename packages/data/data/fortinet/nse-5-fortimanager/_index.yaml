name: "Fortinet NSE 5: FortiManager"
short_name: NSE 5 FortiManager
slug: nse-5-fortimanager
status: active
cost: "$400 USD"

description: >-
  The NSE 5 FortiManager certification validates skills in centrally
  managing Fortinet devices using FortiManager. It covers device
  registration, policy package management, FortiGuard distribution,
  firmware management, configuration revision control, and
  administrative domains (ADOMs) for multi-tenant management.

