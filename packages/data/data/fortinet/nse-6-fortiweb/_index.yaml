name: "Fortinet NSE 6: FortiWeb"
short_name: NSE 6 FortiWeb
slug: nse-6-fortiweb
status: active
cost: "$400 USD"

description: >-
  The NSE 6 FortiWeb certification validates skills in deploying and
  managing FortiWeb web application firewalls. It covers web application
  security, HTTP protocol handling, bot mitigation, API protection,
  DDoS protection, machine learning-based threat detection, and
  SSL offloading for protecting web applications and APIs.

