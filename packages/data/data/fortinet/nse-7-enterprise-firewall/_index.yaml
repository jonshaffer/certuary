name: "Fortinet NSE 7: Enterprise Firewall"
short_name: NSE 7 Enterprise Firewall
slug: nse-7-enterprise-firewall
status: active
cost: "$400 USD"

description: >-
  The NSE 7 Enterprise Firewall certification validates advanced skills
  in designing and deploying complex FortiGate enterprise firewall
  solutions. It covers advanced routing, high availability, VDOM
  configuration, SD-WAN optimization, ZTNA, advanced IPsec VPN
  topologies, and enterprise-scale security architecture using
  FortiGate and the Fortinet Security Fabric.

