name: Oracle Cloud Infrastructure Security Professional
short_name: OCI Security Professional
slug: oracle-cloud-infrastructure-security-professional
status: active
cost: "$245 USD"

description: >-
  Validates the ability to secure and manage Oracle Cloud Infrastructure
  environments. Covers OCI security fundamentals, identity and access
  management, infrastructure and network security, data protection, and
  security monitoring using services such as Cloud Guard, Security Zones,
  and Data Safe.

tags:
  - cloud
  - security
