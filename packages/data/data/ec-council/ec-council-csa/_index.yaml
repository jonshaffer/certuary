name: Certified SOC Analyst
short_name: CSA
slug: ec-council-csa
status: active
cost: "$999 USD"

description: >-
  The Certified SOC Analyst (CSA) certification validates skills needed
  for Tier I and Tier II SOC analyst roles. CSA covers SOC operations,
  log management, SIEM deployment, advanced incident detection, and
  incident response. It is designed as the first step for aspiring SOC
  analysts to demonstrate competency in security monitoring and analysis.

