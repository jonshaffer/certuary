name: Certified Application Security Engineer - .NET
short_name: CASE .NET
slug: case-net
status: active
cost: "$1,199 USD"

description: >-
  The Certified Application Security Engineer - .NET (CASE .NET) certification
  validates skills in building secure .NET applications. CASE .NET covers
  secure SDLC, input validation, authentication and authorization mechanisms,
  cryptographic techniques, error handling, session management, and secure
  deployment practices specific to the .NET platform and ecosystem.

