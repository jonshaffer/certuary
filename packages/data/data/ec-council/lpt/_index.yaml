name: Licensed Penetration Tester (Master)
short_name: LPT (Master)
slug: lpt
status: active
cost: "$899 USD"

description: >-
  The Licensed Penetration Tester (Master) designation is the pinnacle of
  EC-Council's penetration testing track. Candidates who score 90% or above
  on the CPENT exam automatically earn the LPT (Master) credential. It
  validates expert-level skills in advanced penetration testing methodologies,
  multi-layered network exploitation, and comprehensive security assessment.

