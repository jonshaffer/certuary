name: Computer Hacking Forensic Investigator
short_name: CHFI
slug: chfi
status: active
cost: "$1,199 USD"

description: >-
  The Computer Hacking Forensic Investigator (CHFI) certification validates
  skills in detecting cyber attacks, extracting digital evidence, and
  conducting forensic investigations. CHFI covers forensic science, digital
  evidence handling, hard disk and file system forensics, operating system
  forensics, network forensics, web and database forensics, cloud and
  mobile forensics, and malware forensics.

