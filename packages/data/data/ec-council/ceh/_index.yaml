name: Certified Ethical Hacker
short_name: CEH
slug: ceh
status: active
cost: "$1,199 USD"

description: >-
  The Certified Ethical Hacker (CEH) certification validates skills in
  understanding and identifying vulnerabilities in target systems using the
  same knowledge and tools as a malicious hacker, but in a lawful and
  legitimate manner. CEH covers footprinting, scanning, enumeration,
  system hacking, malware threats, sniffing, social engineering, denial
  of service, session hijacking, web server and application hacking,
  SQL injection, wireless network hacking, cryptography, and cloud
  computing security.

tags:
  - cybersecurity
  - intermediate
  - ethical-hacking
  - penetration-testing
  - offensive-security
  - dod-8570
  - ec-council

prerequisites:
  - Two years of information security experience recommended
  - Official EC-Council training or self-study with approval

related_certs:
