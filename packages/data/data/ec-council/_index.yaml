name: EC-Council
slug: ec-council
website: https://www.eccouncil.org
description: >-
  EC-Council (International Council of E-Commerce Consultants) is a global
  leader in cybersecurity education and certification. Known for the Certified
  Ethical Hacker (CEH) credential, EC-Council offers certifications spanning
  ethical hacking, penetration testing, digital forensics, network defense,
  incident handling, and security management.
