name: Certified Application Security Engineer - Java
short_name: CASE Java
slug: case-java
status: active
cost: "$1,199 USD"

description: >-
  The Certified Application Security Engineer - Java (CASE Java) certification
  validates skills in building secure Java applications. CASE Java covers
  secure SDLC, input validation, authentication and authorization mechanisms,
  cryptographic techniques, error handling, session management, and secure
  deployment practices specific to the Java platform and ecosystem.

tags:
  - cybersecurity
