name: Certified Information Privacy Professional/United States
short_name: CIPP/US
slug: cipp-us
status: active
cost: "$550 USD (IAPP member) / $800 USD (non-member)"

description: >-
  The CIPP/US certification demonstrates comprehensive knowledge of
  U.S. privacy laws and regulations, covering the legal environment,
  limits on private-sector collection and use of data, government and
  court access to private-sector information, and workplace privacy.

