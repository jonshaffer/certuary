name: Certified Information Privacy Professional/United States
short_name: CIPP/US
slug: cipp-us
status: active
cost: "$550 USD (IAPP member) / $800 USD (non-member)"

description: >-
  The CIPP/US certification demonstrates comprehensive knowledge of
  U.S. privacy laws and regulations, covering the legal environment,
  limits on private-sector collection and use of data, government and
  court access to private-sector information, and workplace privacy.

tags:
  - privacy
  - compliance
  - data-protection
  - intermediate
  - iapp

prerequisites:
  - No formal prerequisites; professional experience in privacy recommended

related_certs:
  - cipp-e
  - cipp-c
  - cipp-a
  - cipp-cn
  - cipm
  - cipt
  - aigp
  - cdpse
  - cissp
  - hcispp

domains:
  - name: The U.S. Privacy Environment
    subdomains:
      - name: Understand the U.S. legal framework
      - name: Understand the enforcement framework for U.S. privacy and security laws
      - name: Understand the principles of information management from a U.S. perspective
  - name: Federal Privacy Laws
    subdomains:
      - name: Understand how the Federal Trade Commission addresses consumer protection in regard to privacy and security
      - name: Understand how healthcare and medical privacy is regulated
      - name: Understand how financial sector privacy is regulated
      - name: Understand how education sector privacy is regulated
      - name: Understand how privacy is regulated in telecommunications and marketing activities
  - name: Government and Court Access to Private-sector Information
    subdomains:
      - name: Understand the relationship between law enforcement and privacy issues
      - name: Understand the relationship between national security and privacy
      - name: Understand issues regarding civil litigation and privacy
  - name: Workplace Privacy
    subdomains:
      - name: Understand the issues involved in workplace privacy
      - name: "Understand workplace privacy issues that arise before, during and after employment"
  - name: State Privacy Laws
    subdomains:
      - name: Understand concepts of authority governing state privacy laws
      - name: Understand the key concepts and principles of state data privacy and security laws
      - name: Understand the key principles of state data breach notification laws

