name: Certified Information Privacy Manager
short_name: CIPM
slug: cipm
status: active
cost: "$550 USD (IAPP member) / $800 USD (non-member)"

description: >-
  The CIPM certification validates the ability to create and manage
  a privacy program, covering privacy program governance, applicable
  laws and practices, data assessments, protecting personal information,
  and performance measurement.

