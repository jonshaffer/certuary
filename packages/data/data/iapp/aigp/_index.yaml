name: Artificial Intelligence Governance Professional
short_name: AIGP
slug: aigp
status: active
cost: "$550 USD (IAPP member) / $800 USD (non-member)"

description: >-
  The AIGP certification validates knowledge of AI governance, including
  the regulatory landscape for AI, risk frameworks, responsible AI
  principles, and the practical implementation of AI governance programs.
  It covers AI development lifecycle management, ethical considerations,
  and compliance with emerging AI regulations worldwide.

