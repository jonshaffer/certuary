name: Certified Information Privacy Professional/Asia
short_name: CIPP/A
slug: cipp-a
status: active
cost: "$550 USD (IAPP member) / $800 USD (non-member)"

description: >-
  The CIPP/A certification validates knowledge of privacy laws and
  regulations across the Asia-Pacific region, specifically focusing on
  the frameworks of Singapore, Hong Kong, and India, along with
  common privacy principles and practices in the region.

tags:
  - privacy
  - compliance
  - data-protection
  - intermediate
  - iapp

prerequisites:
  - No formal prerequisites; professional experience in privacy recommended

related_certs:
  - cipp-us
  - cipp-e
  - cipp-c
  - cipp-cn
  - cipm
  - cipt
  - aigp
  - cdpse
  - cissp

domains:
  - name: Privacy Fundamentals
    subdomains:
      - name: Modern Privacy Principles
      - name: Adequacy and the Rest of the World
      - name: Elements of personal information
  - name: Singapore Privacy Laws and Practices
    subdomains:
      - name: Legislative history and origins
      - name: Personal Data Protection Act 2012 (PDPA)
      - name: Enforcement
  - name: Hong Kong Privacy Laws and Practices
    subdomains:
      - name: Legislative history and origins
      - name: Personal Data (Privacy) Ordinance (PDPO)
      - name: Enforcement
  - name: India Privacy Law and Practices
    subdomains:
      - name: Legislative history and origins
      - name: Digital Personal Data Protection Act 2023 (DPDPA)
      - name: Enforcement
  - name: Common themes among principle frameworks
    subdomains:
      - name: Comparing protections and principles
      - name: Rights of the data subject

