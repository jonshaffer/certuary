slug: fip
name: Fellow of Information Privacy
description: >-
  The Fellow of Information Privacy (FIP) is IAPP's highest designation,
  recognizing professionals who hold a CIPP certification in any
  jurisdiction combined with either the CIPM or CIPT certification,
  demonstrating comprehensive privacy expertise across law, management,
  and technology.
website: https://iapp.org/certify/fip/
status: active
required_certs:
  - cipp-us
  - cipp-e
  - cipp-c
  - cipp-a
  - cipm
  - cipt
phases:
  - name: Privacy Law Knowledge
    order: 1
    certificate_slugs:
      - cipp-us
      - cipp-e
      - cipp-c
      - cipp-a
  - name: Privacy Practice Knowledge
    order: 2
    certificate_slugs:
      - cipm
      - cipt
completion_criteria:
  required: 2
  notes: >-
    Requires one CIPP certification (any jurisdiction variant: US, E, C, or A)
    plus either CIPM or CIPT. Both certifications must be active simultaneously.
