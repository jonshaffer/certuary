name: Certified Information Privacy Professional/China
short_name: CIPP/CN
slug: cipp-cn
status: active
cost: "$550 USD (IAPP member) / $800 USD (non-member)"

description: >-
  The CIPP/CN certification validates knowledge of privacy laws and
  regulations in China, including the Personal Information Protection
  Law (PIPL), the Cybersecurity Law, and the Data Security Law, along
  with common privacy principles and practices in the region.

