name: Certified Information Privacy Technologist
short_name: CIPT
slug: cipt
status: active
cost: "$550 USD (IAPP member) / $800 USD (non-member)"

description: >-
  The CIPT certification validates understanding of how to build privacy
  requirements and controls into technology and products, covering
  privacy by design, privacy engineering, technical privacy controls,
  and privacy in the software development lifecycle.

