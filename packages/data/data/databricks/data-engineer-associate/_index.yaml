name: Databricks Certified Data Engineer Associate
short_name: Data Engineer Associate
slug: data-engineer-associate
status: active
cost: "$200 USD"

description: >-
  The Databricks Certified Data Engineer Associate validates the ability
  to use the Databricks Lakehouse Platform to complete introductory data
  engineering tasks including designing and implementing data pipelines
  using Apache Spark, Delta Lake, and Databricks SQL, as well as managing
  data workflows with Delta Live Tables and Databricks Workflows.

