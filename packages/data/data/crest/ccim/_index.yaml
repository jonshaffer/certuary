name: CREST Certified Incident Manager
short_name: CCIM
slug: ccim
status: active
description: >-
  The CCIM certification validates advanced skills in managing and coordinating
  cyber security incident response operations. It covers incident management
  frameworks, stakeholder communication, team coordination, evidence handling,
  and the ability to lead an organization's response to complex security
  incidents.
