name: Information Technology Certified Associate
short_name: ITCA
slug: itca
status: retired
cost: "N/A"

description: >-
  The ITCA was ISACA's entry-level, modular IT certificate program designed
  for early-career professionals and career changers. It covered five key
  domains through individual certificate exams: IT Fundamentals, Networking
  and Infrastructure, Cybersecurity, Data Science, and Software Development.
  The program was discontinued in January 2026.

