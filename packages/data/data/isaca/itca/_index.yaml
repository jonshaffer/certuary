name: Information Technology Certified Associate
short_name: ITCA
slug: itca
status: active
cost: "$150+ USD per module"

description: >-
  The ITCA is ISACA's entry-level, modular IT certification designed for
  early-career professionals and career changers. It covers five key
  domains through individual certificate exams: IT Fundamentals, Networking
  and Infrastructure, Cybersecurity, Data Science, and Software Development.
  Completing all five earns the full ITCA credential.

