name: Certified Information Systems Auditor
short_name: CISA
slug: cisa
status: active
cost: "$575 USD (ISACA member) / $760 USD (non-member)"

description: >-
  The CISA certification validates expertise in auditing, controlling,
  monitoring, and assessing information technology and business systems.
  It is globally recognized as the standard of achievement for IT audit
  professionals and is approved for DoD 8570 IAM Level II and IAT Level II.

tags:
  - cybersecurity
  - audit
  - governance
  - advanced
  - dod-8570
  - isaca

prerequisites:
  - Five years of professional experience in information systems auditing, control, or security

related_certs:
