name: Certified Information Security Manager
short_name: CISM
slug: cism
status: active
cost: "$575 USD (ISACA member) / $760 USD (non-member)"

description: >-
  The CISM certification is designed for information security managers and
  validates expertise in information security governance, risk management,
  program development and management, and incident management. It is
  approved for DoD 8570 IAM Level II and IAM Level III.

