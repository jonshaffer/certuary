name: Certified in the Governance of Enterprise IT
short_name: CGEIT
slug: cgeit
status: active
cost: "$575 USD (ISACA member) / $760 USD (non-member)"

description: >-
  The CGEIT certification validates expertise in enterprise IT governance,
  including strategic alignment, value delivery, risk management, resource
  management, and performance measurement. It is designed for professionals
  who manage, advise, or provide assurance around enterprise IT governance.

tags:
  - governance
  - it-management
  - advanced
  - isaca

prerequisites:
  - Five years of professional experience in enterprise IT governance

