name: Certified in Risk and Information Systems Control
short_name: CRISC
slug: crisc
status: active
cost: "$575 USD (ISACA member) / $760 USD (non-member)"

description: >-
  The CRISC certification validates expertise in identifying, assessing,
  and managing IT and enterprise risk, and in designing, implementing,
  and maintaining information systems controls. It is the only certification
  focused on enterprise IT risk management.

tags:
  - cybersecurity
  - risk
  - governance
  - advanced
  - isaca

prerequisites:
  - Three years of professional experience in IT risk management and IS control

related_certs:
  - cisa
  - cism
  - cgeit
  - cissp
  - cgrc
  - pmi-rmp

