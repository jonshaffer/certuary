name: Certified Data Privacy Solutions Engineer
short_name: CDPSE
slug: cdpse
status: active
cost: "$575 USD (ISACA member) / $760 USD (non-member)"

description: >-
  The CDPSE certification validates the technical skills and knowledge
  needed to assess, build, and implement comprehensive privacy solutions.
  It bridges the gap between privacy regulations and technology
  implementation, covering privacy governance, architecture, and
  data lifecycle management.

tags:
  - privacy
  - data-protection
  - compliance
  - intermediate
  - isaca

prerequisites:
  - Three years of professional experience in privacy technology implementation

