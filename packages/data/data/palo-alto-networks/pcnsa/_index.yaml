name: Palo Alto Networks Certified Network Security Administrator
short_name: PCNSA
slug: pcnsa
status: active
cost: "$175 USD"

description: >-
  The PCNSA certification validates the ability to deploy, configure,
  and manage Palo Alto Networks next-generation firewalls. It covers
  firewall configuration, security policy management, networking,
  threat prevention, URL filtering, App-ID, User-ID, and basic
  troubleshooting of Palo Alto Networks firewall deployments.

