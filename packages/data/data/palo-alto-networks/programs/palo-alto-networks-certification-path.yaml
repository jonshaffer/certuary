  security automation, and detection and response.
website: https://www.paloaltonetworks.com/services/education/certification
status: active
required_certs: []
phases:
  - name: Entry-level
    order: 1
    certificate_slugs:
      - pccet
  - name: Administrator
    order: 2
    certificate_slugs:
      - pcnsa
      - pcdra
  - name: Engineer / Specialist
    order: 3
    certificate_slugs:
      - pcnse
      - pcsae
      - pccse
completion_criteria:
  required: 0
  notes: >-
    No fixed completion criteria. Palo Alto Networks recommends starting
