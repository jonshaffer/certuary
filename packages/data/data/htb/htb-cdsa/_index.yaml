description: >-
  The HTB CDSA validates skills in security analysis and SOC operations.
  Candidates must demonstrate the ability to identify security incidents,
  analyze network traffic and logs, detect intrusions, and identify detection
  avenues not immediately apparent from data analysis. The practical exam
  requires submitting flags and a professional report within seven days.
