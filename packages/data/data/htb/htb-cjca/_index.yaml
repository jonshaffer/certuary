name: HTB Certified Junior Cybersecurity Associate
short_name: HTB CJCA
slug: htb-cjca
status: active
cost: "$105 USD"
exam_format: performance-based
description: >-
  The HTB CJCA is an entry-level certification that validates foundational
  cybersecurity skills across both offensive and defensive domains. Candidates
  must complete a gray-box penetration test, perform defensive analysis using
  SIEM tools, and submit a commercial-grade professional report. The exam
  assesses the ability to identify vulnerabilities, perform basic exploitation,
  analyze network traffic and logs, and detect intrusions.
