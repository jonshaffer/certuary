prerequisites:
  - Completion of 100% of the Penetration Tester job role path on HTB Academy
  - Intermediate knowledge of web and infrastructure penetration testing
  - Knowledge of web applications, operating systems, and networking basics
  - Manual and automated exploitation skills
  - Professional communication and reporting abilities
