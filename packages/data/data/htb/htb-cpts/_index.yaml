name: HTB Certified Penetration Testing Specialist
short_name: HTB CPTS
slug: htb-cpts
status: active
cost: "$210 USD"
exam_format: performance-based
description: >-
  The HTB CPTS validates a practitioner's ability to conduct comprehensive
  penetration tests using industry-standard techniques. The exam requires
  candidates to compromise real systems across external and internal networks,
  including Active Directory environments, and submit a professional
  penetration testing report. The certification covers the full penetration
  testing lifecycle from reconnaissance through exploitation and reporting.
