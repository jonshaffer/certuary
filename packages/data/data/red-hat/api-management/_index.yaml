name: Red Hat Certified Specialist in API Management
short_name: EX240
slug: api-management
status: active
cost: "$400 USD"
exam_format: performance-based
duration_minutes: 240

description: >-
  Validates the ability to configure and manage APIs using Red Hat
  3scale API Management. The exam tests skills in creating and
  publishing APIs, configuring access controls, setting rate limits,
  managing developer portals, and implementing API analytics and
  monetization strategies.

