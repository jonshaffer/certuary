name: Red Hat Certified Specialist in Ceph Cloud Storage
short_name: EX260
slug: ceph-cloud-storage
status: active
cost: "$400 USD"
exam_format: performance-based
duration_minutes: 180

description: >-
  Validates the ability to deploy, manage, and troubleshoot Red Hat
  Ceph Storage clusters. The exam tests skills in configuring Ceph
  storage pools, managing RADOS Block Devices, deploying CephFS,
  configuring RADOS Gateway for object storage, and monitoring
  cluster health.

tags:
  - storage
  - ceph
  - cloud-storage
  - advanced
  - performance-based
  - red-hat

prerequisites:
  - RHCSA recommended
  - Experience with storage administration

related_certs:
  - rhcsa
  - openshift-data-foundation

versions:
  - version: "EX260V5"
    release_date: "2023-01-01"
    notes: >-
      Current version covering Red Hat Ceph Storage 5.

links:
  - label: Official Certification Page
    url: https://www.redhat.com/en/services/certification/red-hat-certified-specialist-ceph-cloud-storage
    type: official
  - label: EX260 Exam Objectives
    url: https://www.redhat.com/en/services/training/ex260-red-hat-certified-specialist-ceph-cloud-storage-exam
    type: source-of-truth

domains:
  - name: "Install Red Hat Ceph Storage"
  - name: "Configure Red Hat Ceph Storage"
  - name: "Provide block storage using RADOS Block Device (RBD)"
  - name: "Provide object storage using RADOS Gateway (RGW)"
  - name: "Provide file storage with CephFS"
  - name: "Manage CRUSH maps and placement rules"
  - name: "Monitor and manage cluster operations"
  - name: "Integrate with Red Hat OpenStack Platform"

source_of_truth_url: https://www.redhat.com/en/services/training/ex260-red-hat-certified-specialist-ceph-cloud-storage-exam
last_verified: "2026-04-04"
