name: Red Hat Certified Specialist in Ceph Cloud Storage
short_name: EX260
slug: ceph-cloud-storage
status: active
cost: "$400 USD"
exam_format: performance-based
duration_minutes: 180

description: >-
  Validates the ability to deploy, manage, and troubleshoot Red Hat
  Ceph Storage clusters. The exam tests skills in configuring Ceph
  storage pools, managing RADOS Block Devices, deploying CephFS,
  configuring RADOS Gateway for object storage, and monitoring
  cluster health.

tags:
  - storage
  - ceph
  - cloud-storage
  - advanced
  - performance-based
  - red-hat

prerequisites:
  - RHCSA recommended
  - Experience with storage administration

related_certs:
  - rhcsa
  - openshift-data-foundation

versions:
  - version: "EX260V5"
    release_date: "2023-01-01"
    notes: >-
      Current version covering Red Hat Ceph Storage 5.

