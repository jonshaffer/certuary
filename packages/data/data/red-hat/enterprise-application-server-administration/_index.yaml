name: Red Hat Certified Specialist in Enterprise Application Server Administration
short_name: EX248
slug: enterprise-application-server-administration
status: active
cost: "$400 USD"
exam_format: performance-based
duration_minutes: 240

description: >-
  Validates the ability to configure, manage, and monitor JBoss
  Enterprise Application Platform (EAP) instances. The exam tests
  skills in deploying Java EE applications, configuring data sources,
  setting up messaging, managing clustering, and tuning JBoss EAP
  for production environments.

