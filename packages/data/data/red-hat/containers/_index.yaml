name: Red Hat Certified Specialist in Containers
short_name: EX188
slug: containers
status: active
cost: "$400 USD"
exam_format: performance-based
duration_minutes: 180

description: >-
  Validates the ability to find, customize, and run containerized services
  using Podman, Buildah, and Skopeo. The exam tests skills in creating
  custom container images, managing containers, and running multi-container
  applications using container tools on Red Hat Enterprise Linux.

