name: Red Hat Certified Specialist in Linux Diagnostics and Troubleshooting
short_name: EX342
slug: linux-diagnostics-and-troubleshooting
status: active
cost: "$400 USD"
exam_format: performance-based
duration_minutes: 180

description: >-
  Validates the ability to diagnose and resolve issues in Red Hat
  Enterprise Linux systems. The exam tests skills in troubleshooting
  boot issues, file system problems, network configuration, application
  debugging, kernel tuning, and security-related issues using diagnostic
  tools and log analysis.

tags:
  - linux
  - troubleshooting
  - diagnostics
  - advanced
  - performance-based
  - red-hat
  - rhel

prerequisites:
  - RHCSA recommended
  - Experience with Linux system troubleshooting

related_certs:
  - rhcsa
  - rhce

versions:
  - version: "EX342V9"
    release_date: "2022-05-10"
    notes: >-
      Current version based on Red Hat Enterprise Linux 9.

links:
  - label: Official Certification Page
    url: https://www.redhat.com/en/services/certification/red-hat-certified-specialist-in-linux-diagnostics-and-troubleshooting
    type: official
  - label: EX342 Exam Objectives
    url: https://www.redhat.com/en/services/training/ex342-red-hat-certified-specialist-linux-diagnostics-and-troubleshooting-exam
    type: source-of-truth

domains:
  - name: "Understand and employ general methods for troubleshooting"
  - name: "Collect system information to aid in troubleshooting"
  - name: "Consult documentation resources to aid in troubleshooting"
  - name: "Diagnose and troubleshoot system startup issues"
  - name: "Diagnose and troubleshoot file system issues"
  - name: "Diagnose and troubleshoot network issues"
  - name: "Diagnose and troubleshoot application issues"
  - name: "Diagnose and troubleshoot security issues"
  - name: "Diagnose and troubleshoot kernel issues"

