name: Red Hat Certified Specialist in Event-Driven Application Development
short_name: EX378
slug: event-driven-application-development
status: active
cost: "$400 USD"
exam_format: performance-based
duration_minutes: 180

description: >-
  Validates the ability to develop event-driven applications using
  Apache Kafka on Red Hat platforms. The exam tests skills in producing
  and consuming messages, configuring Kafka clients, implementing event
  streaming patterns, and deploying event-driven applications on
  OpenShift using AMQ Streams.

