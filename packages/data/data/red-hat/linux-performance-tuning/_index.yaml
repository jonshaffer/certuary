name: Red Hat Certified Specialist in Linux Performance Tuning
short_name: EX442
slug: linux-performance-tuning
status: active
cost: "$400 USD"
exam_format: performance-based
duration_minutes: 240

description: >-
  Validates the ability to analyze and optimize the performance of
  Red Hat Enterprise Linux systems. The exam tests skills in using
  performance analysis tools, tuning kernel parameters, optimizing
  CPU scheduling, memory management, I/O throughput, and network
  performance for enterprise workloads.

tags:
  - linux
  - performance
  - tuning
  - advanced
  - performance-based
  - red-hat
  - rhel

prerequisites:
  - RHCSA and RHCE recommended
  - Experience with Linux performance analysis

related_certs:
  - rhcsa
  - rhce

versions:
  - version: "EX442V9"
    release_date: "2022-05-10"
    notes: >-
      Current version based on Red Hat Enterprise Linux 9.

links:
  - label: Official Certification Page
    url: https://www.redhat.com/en/services/certification/red-hat-certified-specialist-linux-performance-tuning
    type: official
  - label: EX442 Exam Objectives
    url: https://www.redhat.com/en/services/training/ex442-red-hat-certified-specialist-performance-tuning-exam
    type: source-of-truth

domains:
  - name: "Use utilities such as vmstat, iostat, mpstat, sar, and top to analyze and report system and application behavior"
  - name: "Configure systems to provide performance metrics using Performance Co-Pilot (PCP)"
  - name: "Use PAM to implement restrictions on critical system resources"
  - name: "Use /proc/sys, sysctl, and /sys to examine and set kernel run-time parameters"
  - name: "Use utilities such as dmesg, dmidecode, and sosreport to profile system hardware configurations"
  - name: "Analyze system and application behavior using tools such as ps, strace, top, and Valgrind"
  - name: "Configure disk subsystems for optimal performance"
  - name: "Configure kernel behavior by altering module parameters"
  - name: "Calculate and set network buffer sizes"
  - name: "Use eBPF tools to diagnose system and application behavior"
  - name: "Select and configure tuned profiles"

source_of_truth_url: https://www.redhat.com/en/services/training/ex442-red-hat-certified-specialist-performance-tuning-exam
last_verified: "2026-04-04"
