name: Red Hat Certified Specialist in Services Management and Automation
short_name: EX358
slug: services-management-and-automation
status: active
cost: "$400 USD"
exam_format: performance-based
duration_minutes: 240

description: >-
  Validates the ability to manage and automate network services on
  Red Hat Enterprise Linux using Ansible and related tools. The exam
  tests skills in configuring and automating DNS, DHCP, email, database,
  web server, and other network services using Ansible playbooks and
  roles.

tags:
  - ansible
  - automation
  - services
