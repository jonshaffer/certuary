name: Red Hat Certified Architect (RHCA)
short_name: RHCA
slug: rhca
status: active
cost: "$0 USD"

description: >-
  The RHCA is Red Hat's highest level of certification, recognizing
  senior IT professionals with extensive expertise across Red Hat
  technologies. To earn the RHCA, candidates must hold an active RHCE
  and pass five additional Red Hat Certified Specialist exams of their
  choosing, demonstrating broad and deep knowledge across multiple
  Red Hat product areas.

