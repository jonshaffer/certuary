name: Red Hat Certified Specialist in Deployment and Systems Management
short_name: EX403
slug: deployment-and-systems-management
status: active
cost: "$400 USD"
exam_format: performance-based
duration_minutes: 240

description: >-
  Validates the ability to deploy and manage Red Hat Enterprise Linux
  systems at scale using Red Hat Satellite. The exam tests skills in
  provisioning, patching, content management, subscription management,
  and lifecycle management for large-scale RHEL deployments.

tags:
  - linux
  - deployment
  - satellite
  - systems-management
  - advanced
  - performance-based
  - red-hat
  - rhel

prerequisites:
  - RHCSA recommended
  - Experience with Red Hat Satellite

related_certs:
  - rhcsa
  - rhce

versions:
