name: Red Hat Certified System Administrator (RHCSA)
short_name: RHCSA
slug: rhcsa
status: active
cost: "$400 USD"
exam_format: performance-based
duration_minutes: 150

description: >-
  The RHCSA validates the ability to perform core Linux system administration
  tasks on Red Hat Enterprise Linux. This performance-based exam tests
  hands-on skills including managing users and groups, configuring file
  systems, managing SELinux, configuring networking, and performing basic
  container management.

tags:
  - linux
  - system-administration
  - entry-level
  - performance-based
  - red-hat
  - rhel

prerequisites: []

related_certs:
