name: Red Hat Certified Specialist in OpenShift Data Foundation
short_name: EX370
slug: openshift-data-foundation
status: active
cost: "$400 USD"
exam_format: performance-based
duration_minutes: 180

description: >-
  Validates the ability to deploy and manage persistent storage for
  applications running on Red Hat OpenShift using OpenShift Data
  Foundation (formerly OpenShift Container Storage). The exam tests
  skills in deploying ODF, configuring storage classes, managing
  persistent volumes, and troubleshooting storage issues.

