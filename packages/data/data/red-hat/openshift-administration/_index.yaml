name: Red Hat Certified Specialist in OpenShift Administration
short_name: EX280
slug: openshift-administration
status: active
cost: "$400 USD"
exam_format: performance-based
duration_minutes: 180

description: >-
  Validates the ability to create, configure, and manage a Red Hat
  OpenShift Container Platform cluster. The exam covers deploying
  applications, managing cluster resources, configuring authentication
  and authorization, networking, and persistent storage on OpenShift.

tags:
  - openshift
  - containers
  - kubernetes
  - administration
  - intermediate
  - performance-based
  - red-hat

prerequisites:
  - RHCSA recommended
  - Experience with Red Hat OpenShift Container Platform

related_certs:
  - rhcsa
  - cka
  - ckad
  - containers
  - openshift-application-development

versions:
