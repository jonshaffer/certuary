name: Red Hat Certified Specialist in OpenShift Application Development
short_name: EX288
slug: openshift-application-development
status: active
cost: "$400 USD"
exam_format: performance-based
duration_minutes: 180

description: >-
  Validates the ability to deploy existing applications in a Red Hat
  OpenShift Container Platform environment. The exam covers building
  and deploying applications from source code and container images,
  customizing deployments, and implementing CI/CD pipelines on OpenShift.

