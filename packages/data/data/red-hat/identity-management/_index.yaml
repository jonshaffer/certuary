name: Red Hat Certified Specialist in Identity Management
short_name: EX362
slug: identity-management
status: active
cost: "$400 USD"
exam_format: performance-based
duration_minutes: 240

description: >-
  Validates the ability to configure and manage Red Hat Identity
  Management (IdM) and integrate it with Active Directory. The exam
  tests skills in installing IdM, managing users and groups, configuring
  Kerberos authentication, setting up certificate services, establishing
  trust with Active Directory, and managing host-based access control.

tags:
  - identity
  - authentication
  - ldap
  - kerberos
  - advanced
  - performance-based
  - red-hat
  - rhel

prerequisites:
  - RHCSA recommended
  - Experience with identity management concepts

related_certs:
  - rhcsa
  - rhce
  - security-linux

versions:
