name: Offensive Security Certified Professional
short_name: OSCP
slug: oscp
status: active
cost: "$1,749 USD"

description: >-
  The OSCP (PEN-200) is the gold standard certification for penetration testing
  professionals. It validates a candidate's ability to identify vulnerabilities,
  execute exploits, and escalate privileges across diverse target systems in a
  controlled lab environment. The exam requires hands-on exploitation of
  multiple machines within a strict time limit and submission of a professional
  penetration testing report. OSCP holders demonstrate practical offensive
  security skills that are highly valued across the cybersecurity industry.

tags:
  - cybersecurity
  - intermediate
  - offsec
  - penetration-testing
  - offensive-security
  - active-directory

prerequisites:
  - Solid understanding of TCP/IP networking
  - Familiarity with Linux and Windows operating systems
  - Scripting and programming experience (Python, Bash)
  - Completion of PEN-200 course materials recommended

related_certs:
  - comptia-pentest-plus
  - ceh
  - gpen
  - htb-cpts
  - osep
  - oswe
  - oswp

exam_format: performance-based
passing_score: 70
duration_minutes: 1425
question_count:
