name: Offensive Security Wireless Professional
short_name: OSWP
slug: oswp
status: active
cost: "$799 USD"

description: >-
  The OSWP (PEN-210) validates practical skills in wireless network auditing
  and security assessment. Candidates must demonstrate the ability to identify
  vulnerabilities in 802.11 wireless networks, perform packet capture and
  analysis, and execute attacks against various wireless encryption standards
  including WEP, WPA, and WPA2. The exam requires hands-on exploitation of
  wireless networks in a controlled lab environment.

tags:
  - cybersecurity
  - intermediate
  - offsec
  - wireless-security
  - offensive-security
  - network-security

prerequisites:
  - Basic understanding of TCP/IP networking
  - Familiarity with Linux command line
  - Understanding of wireless networking fundamentals
  - Completion of PEN-210 course materials recommended

related_certs:
