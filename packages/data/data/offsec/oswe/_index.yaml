name: Offensive Security Web Expert
short_name: OSWE
slug: oswe
status: active
cost: "$1,749 USD"

description: >-
  The OSWE (WEB-300) validates advanced web application security skills through
  white-box testing and source code analysis. Candidates must identify and
  exploit complex vulnerabilities in web applications by analyzing source code,
  developing custom exploits, and chaining multiple vulnerabilities together.
  The exam requires candidates to compromise web applications by discovering
  authentication bypasses, injection flaws, and insecure deserialization
  vulnerabilities through manual source code review.

tags:
  - cybersecurity
  - advanced
  - offsec
  - web-security
  - offensive-security
  - source-code-analysis

prerequisites:
  - OSCP certification or equivalent experience recommended
  - Strong web application security fundamentals
  - Proficiency in at least one programming language (JavaScript, Python, Java, C#)
  - Completion of WEB-300 course materials recommended

related_certs:
  - htb-cwee
  - oscp
  - oswa

exam_format: performance-based
passing_score: 70
duration_minutes: 2880

