name: Offensive Security (OffSec)
slug: offsec
website: https://www.offsec.com/courses-and-certifications/
description: >-
  Offensive Security (OffSec) is the industry-leading provider of hands-on
  cybersecurity training and certifications. Known for its rigorous
  performance-based exams that require candidates to demonstrate real-world
  skills in live environments, OffSec certifications such as the OSCP are
  widely regarded as the gold standard in penetration testing and offensive
  security. OffSec also maintains the Kali Linux distribution and offers
  certifications spanning penetration testing, web application security,
  exploit development, wireless security, and security operations.
