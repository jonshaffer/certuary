name: Offensive Security Defense Analyst
short_name: OSDA
slug: osda
status: active
cost: "$1,749 USD"

description: >-
  The OSDA (SOC-200) validates practical skills in security monitoring, threat
  detection, and incident analysis within a Security Operations Center (SOC)
  environment. Candidates must demonstrate the ability to analyze logs, network
  traffic, and system events to detect and investigate security incidents.
  The exam requires hands-on analysis of real attack scenarios using industry
  tools and techniques to identify indicators of compromise and reconstruct
  attack timelines.

tags:
  - cybersecurity
  - intermediate
  - offsec
  - defensive-security
  - soc
  - threat-detection
  - incident-response

prerequisites:
  - Understanding of TCP/IP networking fundamentals
  - Familiarity with Windows and Linux operating systems
  - Basic knowledge of common attack techniques
  - Completion of SOC-200 course materials recommended

related_certs:
