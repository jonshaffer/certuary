name: Offensive Security Experienced Penetration Tester
short_name: OSEP
slug: osep
status: active
cost: "$1,749 USD"

description: >-
  The OSEP (PEN-300) is an advanced penetration testing certification that
  validates expertise in evasion techniques and breaching hardened enterprise
  environments. Candidates must demonstrate the ability to bypass security
  defenses such as antivirus, application whitelisting, and network
  segmentation. The exam involves a full-scope simulated enterprise penetration
  test requiring advanced lateral movement, custom exploit modification, and
  sophisticated attack chains across multiple network segments.

tags:
  - cybersecurity
  - advanced
  - offsec
  - penetration-testing
  - offensive-security
  - evasion
  - active-directory

prerequisites:
  - OSCP certification or equivalent experience
  - Strong understanding of Windows and Active Directory environments
  - Experience with scripting and programming (C#, PowerShell, Python)
  - Completion of PEN-300 course materials recommended

