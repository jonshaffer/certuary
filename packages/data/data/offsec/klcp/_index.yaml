name: Kali Linux Certified Professional
short_name: KLCP
slug: klcp
status: active
cost: "$499 USD"

description: >-
  The KLCP (KL-101) validates a candidate's knowledge and proficiency with the
  Kali Linux operating system. The certification covers Kali Linux installation,
  configuration, package management, system administration, networking, and
  security tool usage. Unlike other OffSec certifications, the KLCP is a
  knowledge-based exam that tests conceptual understanding of the Kali Linux
  distribution and its underlying Debian foundation.

