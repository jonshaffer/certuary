name: Offensive Security Exploit Developer
short_name: OSED
slug: osed
status: active
cost: "$1,749 USD"

description: >-
  The OSED (EXP-301) validates expertise in Windows user-mode exploit
  development. Candidates must demonstrate the ability to develop custom
  exploits for Windows applications by bypassing modern security mitigations
  such as DEP, ASLR, and CFG. The exam requires hands-on development of
  working exploits through reverse engineering, shellcode creation, and
  advanced debugging techniques. OSED holders demonstrate deep understanding
  of software vulnerabilities and low-level exploitation.

tags:
  - cybersecurity
  - advanced
  - offsec
  - exploit-development
  - offensive-security
  - reverse-engineering

prerequisites:
  - OSCP certification or equivalent experience recommended
  - Strong understanding of x86 assembly language
  - Familiarity with Windows internals and debugging tools
  - Programming experience in Python and C
  - Completion of EXP-301 course materials recommended

related_certs:
  - oscp
  - osep

exam_format: performance-based
passing_score: 70
duration_minutes: 2880

